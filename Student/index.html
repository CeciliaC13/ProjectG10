<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Sign In - UTMSPACE College Booking</title>
  <meta name="description" content="">
  <meta name="keywords" content="">

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: #5c001f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .signin-container {
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .signin-header {
      background: linear-gradient(135deg, #1a3c5e 0%, #2c5a7a 100%);
      padding: 40px 30px;
      text-align: center;
    }

    .signin-header h1 {
      color: white;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: 'Montserrat', sans-serif;
    }

    .signin-header .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .signin-form {
      padding: 40px 35px;
    }

    /* Form Group */
    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-family: 'Montserrat', sans-serif;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i.left-icon {
      position: absolute;
      left: 15px;
      color: #aaa;
      font-size: 18px;
      z-index: 1;
    }

    .password-wrapper {
      position: relative;
      width: 100%;
    }

    .password-wrapper i.left-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 18px;
      z-index: 1;
    }

    .password-wrapper input {
      width: 100%;
      padding: 14px 50px 14px 45px;
      font-size: 15px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-family: 'Roboto', sans-serif;
    }

    .password-wrapper input:focus {
      outline: none;
      border-color: #2c5a7a;
      box-shadow: 0 0 0 3px rgba(44, 90, 122, 0.1);
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
      font-size: 18px;
      transition: color 0.3s ease;
      z-index: 2;
    }

    .toggle-password:hover {
      color: #2c5a7a;
    }

    .form-control {
      width: 100%;
      padding: 14px 15px 14px 45px;
      font-size: 15px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-family: 'Roboto', sans-serif;
    }

    .form-control:focus {
      outline: none;
      border-color: #2c5a7a;
      box-shadow: 0 0 0 3px rgba(44, 90, 122, 0.1);
    }

    /* Forgot Password Link */
    .forgot-password {
      text-align: right;
      margin-bottom: 30px;
    }

    .forgot-password a {
      color: #2c5a7a;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: #5c001f;
      text-decoration: underline;
    }

    /* Login Button */
    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #1a3c5e 0%, #2c5a7a 100%);
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(44, 90, 122, 0.3);
    }

    .login-btn i {
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .login-btn:hover i {
      transform: translateX(5px);
    }

    .register-link {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .register-link p {
      font-size: 14px;
      color: #666;
    }

    .register-link a {
      color: #2c5a7a;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .register-link a:hover {
      color: #764ba2;
    }

    .student-link {
      margin-top: 12px;
    }

    .student-link p {
      font-size: 14px;
      color: #666;
    }

    .student-link a {
      color: #2c5a7a;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .student-link a:hover {
      color: #764ba2;
    }

    .error-message {
      background-color: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* Responsive */
    @media (max-width: 576px) {
      .signin-header {
        padding: 30px 20px;
      }
      
      .signin-header h1 {
        font-size: 28px;
      }
      
      .signin-form {
        padding: 30px 25px;
      }
      
      .form-control {
        padding: 12px 15px 12px 42px;
        font-size: 14px;
      }
      
      .password-wrapper input {
        padding: 12px 50px 12px 42px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="signin-container">
    <div class="signin-header">
      <h1>Sign In</h1>
      <p class="subtitle">College Booking</p>
    </div>

    <div class="signin-form">
      <!-- Error Message -->
      <div class="error-message" id="errorMessage">
        <i class="bi bi-exclamation-triangle-fill"></i> Invalid Student ID or password. Please try again.
      </div>

      <div class="form-group">
        <label>Student ID</label>
        <div class="input-wrapper">
          <i class="bi bi-person left-icon"></i>
          <input type="text" class="form-control" id="studentid" placeholder="Enter your Student ID" autocomplete="username">
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <i class="bi bi-lock left-icon"></i>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
        </div>
      </div>

      <div class="forgot-password">
        <a href="forgotpswd_student.html">Forgot your password?</a>
      </div>

      <button class="login-btn" id="loginBtn">
        Login <i class="bi bi-arrow-right"></i>
      </button>

      <div class="register-link">
        <p>Don't have an account? <a href="register_student.html">Create Account</a></p>
        <div class="student-link">
          <p>Staff or Admin? <a href="../Admin&Staff/admin_staff_login.html">Log in here!</a></p>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase.js"></script>
  <script>
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });

    db.auth.onAuthStateChange(async (event, session) => {
      console.log('Auth event:', event);

      if ((event === 'SIGNED_IN' || event === 'INITIAL_SESSION') && session?.user) {
        console.log('User email:', session.user.email);

        const { data: student } = await db
          .from('Student')
          .select('is_verified')
          .eq('email', session.user.email)
          .single();

        if (student && !student.is_verified) {
          const { error } = await db
            .from('Student')
            .update({ is_verified: true })
            .eq('email', session.user.email);

          console.log('Verification update error:', error);
        }

        await db.auth.signOut();
      }
    });

    document.getElementById('loginBtn').addEventListener('click', async () => {
      const studentid = document.getElementById('studentid').value.trim();
      const password = document.getElementById('password').value.trim();
      const errorBox = document.getElementById('errorMessage');
      const loginBtn = document.getElementById('loginBtn');

      errorBox.classList.remove('show');

      if (!studentid || !password) {
        errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Please fill in all fields.';
        errorBox.classList.add('show');
        return;
      }
      if (!/^[Aa][0-9A-Za-z]+$/.test(studentid)) {
        errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Student ID must start with the letter A (e.g., A24DW0001).';
        errorBox.classList.add('show');
        loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
        loginBtn.disabled = false;
        return;
      }

      loginBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Signing in...';
      loginBtn.disabled = true;

      const { data, error } = await db
        .from('Student')
        .select('*')
        .eq('student_id', studentid)
        .eq('password', password)
        .single();

      if (error || !data) {
        errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Invalid Student ID or Password.';
        errorBox.classList.add('show');
        loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
        loginBtn.disabled = false;
        return;
      }

      if (!data.is_verified) {
        errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Please verify your email before logging in.';
        errorBox.classList.add('show');
        loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
        loginBtn.disabled = false;
        return;
      }

      localStorage.setItem('studentEmail', data.email);
      localStorage.setItem('studentId', data.student_id);
      localStorage.setItem('studentName', data.name);
      window.location.href = 'DashBoard.html';
    });
  </script>
</body>

</html>
