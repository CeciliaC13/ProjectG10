<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Sign In - UTMSPACE College Booking</title>
  <meta name="description" content="">
  <meta name="keywords" content="">

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* Background Image with Blur */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('../img/utmspace.webp');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      filter: blur(8px);
      -webkit-filter: blur(8px);
      transform: scale(1.05);
      z-index: -2;
    }

    /* Dark Overlay for better readability */
    body::after {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: -1;
    }

    .signin-container {
      max-width: 450px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .signin-header {
      background: #6b092a;
      padding: 40px 30px;
      text-align: center;
    }

    .signin-header h1 {
      color: white;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: 'Montserrat', sans-serif;
    }

    .signin-header .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .signin-form {
      padding: 40px 35px;
    }

    /* Form Group */
    .form-group {
      margin-bottom: 25px;
    }

    .form-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 8px;
      font-family: 'Montserrat', sans-serif;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i.left-icon {
      position: absolute;
      left: 15px;
      color: #aaa;
      font-size: 18px;
      z-index: 1;
    }

    .password-wrapper {
      position: relative;
      width: 100%;
    }

    .password-wrapper i.left-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 18px;
      z-index: 1;
    }

    .password-wrapper input {
      width: 100%;
      padding: 14px 50px 14px 45px;
      font-size: 15px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-family: 'Roboto', sans-serif;
    }

    .password-wrapper input:focus {
      outline: none;
      border-color: #2c5a7a;
      box-shadow: 0 0 0 3px rgba(44, 90, 122, 0.1);
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
      font-size: 18px;
      transition: color 0.3s ease;
      z-index: 2;
    }

    .toggle-password:hover {
      color: #6b092a;
    }

    .form-control {
      width: 100%;
      padding: 14px 15px 14px 45px;
      font-size: 15px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-family: 'Roboto', sans-serif;
    }

    .form-control:focus {
      outline: none;
      border-color: #2c5a7a;
      box-shadow: 0 0 0 3px rgba(44, 90, 122, 0.1);
    }

    /* Forgot Password Link */
    .forgot-password {
      text-align: right;
      margin-bottom: 30px;
    }

    .forgot-password a {
      color: #5c001f;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    .forgot-password a:hover {
      color: #2c5a7a;
      text-decoration: underline;
    }

    /* Login Button */
    .login-btn {
      width: 100%;
      background: #6b092a;
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(44, 90, 122, 0.3);
    }

    .login-btn i {
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .login-btn:hover i {
      transform: translateX(5px);
    }

    .register-link {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .register-link p {
      font-size: 14px;
      color: #666;
    }

    .register-link a {
      color: #6b092a;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .register-link a:hover {
      color: #2c5a7a;
    }

    .student-link {
      margin-top: 12px;
    }

    .student-link p {
      font-size: 14px;
      color: #666;
    }

    .student-link a {
      color: #6b092a;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .student-link a:hover {
      color: #2c5a7a;
    }

    .error-message {
      background-color: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    /* Responsive */
    @media (max-width: 576px) {
      .signin-header {
        padding: 30px 20px;
      }
      
      .signin-header h1 {
        font-size: 28px;
      }
      
      .signin-form {
        padding: 30px 25px;
      }
      
      .form-control {
        padding: 12px 15px 12px 42px;
        font-size: 14px;
      }
      
      .password-wrapper input {
        padding: 12px 50px 12px 42px;
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

  <div class="signin-container">
    <div class="signin-header">
      <h1>Sign In</h1>
      <p class="subtitle">College Booking</p>
    </div>

    <div class="signin-form">
      <!-- Error Message -->
      <div class="error-message" id="errorMessage">
        <i class="bi bi-exclamation-triangle-fill"></i> Invalid Student ID or password. Please try again.
      </div>

      <div class="form-group">
        <label>Student ID</label>
        <div class="input-wrapper">
          <i class="bi bi-person left-icon"></i>
          <input type="text" class="form-control" id="studentid" 
            placeholder="Enter your Student ID" 
            autocomplete="username"
            >
        </div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <div class="password-wrapper">
          <i class="bi bi-lock left-icon"></i>
          <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
          <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
        </div>
      </div>

      <div class="forgot-password">
        <a href="forgotpswd_student.html">Forgot your password?</a>
      </div>

      <button class="login-btn" id="loginBtn">
        Login <i class="bi bi-arrow-right"></i>
      </button>

      <div class="register-link">
        <p>Don't have an account? <a href="register_student.html">Create Account</a></p>
        <div class="student-link">
          <p>Staff or Admin? <a href="../Admin&Staff/admin_staff_login.html">Log in here!</a></p>
        </div>
      </div>
    </div>
  </div>

 <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script>
  // ── Toggle password visibility ──────────────────────────────────────────────
  document.getElementById('togglePassword').addEventListener('click', function() {
    const input = document.getElementById('password');
    const type  = input.type === 'password' ? 'text' : 'password';
    input.setAttribute('type', type);
    this.classList.toggle('bi-eye');
    this.classList.toggle('bi-eye-slash');
  });

  // ── Handle email verification callback ─────────────────────────────────────
  const isCallback = window.location.hash.includes('access_token')
                  || window.location.search.includes('code=');

  if (isCallback) {
    db.auth.onAuthStateChange(async (event, session) => {
      if (event === 'SIGNED_IN' && session?.user) {
        const user  = session.user;
        const meta  = user.user_metadata || {};
        const email = user.email;

        const { data: existing } = await db
          .from('Student')
          .select('student_id, is_verified')
          .eq('email', email)
          .maybeSingle();

        if (!existing) {
          // Normal signUp flow — metadata carries all fields
          if (meta.student_id) {
            const { error: insertError } = await db.from('Student').insert({
              student_id:  meta.student_id,
              name:        meta.name,
              email:       email,
              gender:      meta.gender,
              telephone:   meta.telephone,
              password:    meta.plain_password,
              is_verified: true
            });
            if (insertError) console.error('Insert error:', insertError);

          } else {
            // Resend flow — metadata missing, fall back to localStorage
            const pending = JSON.parse(localStorage.getItem('pendingStudent') || 'null');
            if (pending) {
              const { error: insertError } = await db.from('Student').insert({
                student_id:  pending.student_id,
                name:        pending.name,
                email:       email,
                gender:      pending.gender,
                telephone:   pending.telephone,
                password:    pending.plain_password,
                is_verified: true
              });
              if (!insertError) localStorage.removeItem('pendingStudent');
              else console.error('Insert error (localStorage fallback):', insertError);
            } else {
              console.error('No source data found in metadata or localStorage!');
            }
          }

        } else if (!existing.is_verified) {
          // Row exists but not yet verified
          await db.from('Student')
            .update({ is_verified: true })
            .eq('email', email);
        }

        await db.auth.signOut();
        window.history.replaceState({}, document.title, window.location.pathname);
        showVerifiedBanner();
      }
    });
  }

  function showVerifiedBanner() {
    const box = document.getElementById('errorMessage');
    box.removeAttribute('style');
    box.style.backgroundColor = '#dcfce7';
    box.style.color = '#16a34a';
    box.style.display = 'block';
    box.innerHTML = '<i class="bi bi-check-circle-fill"></i> Email verified successfully! You can now log in.';
  }

  // ── Login ───────────────────────────────────────────────────────────────────
  async function handleLogin() {
    const studentid = document.getElementById('studentid').value.trim().toUpperCase();
    const password  = document.getElementById('password').value.trim();
    const errorBox  = document.getElementById('errorMessage');
    const loginBtn  = document.getElementById('loginBtn');

    errorBox.removeAttribute('style');
    errorBox.className = 'error-message';

    if (!studentid || !password) {
      errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Please fill in all fields.';
      errorBox.classList.add('show');
      return;
    }
    if (!/^[A][0-9A-Z]+$/.test(studentid)) {
      errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Student ID must start with the letter A (e.g., A24DW0001).';
      errorBox.classList.add('show');
      return;
    }

    loginBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Signing in...';
    loginBtn.disabled = true;

    // ── Step 1: Check if matric ID exists at all ────────────────────────────
    const { data: studentRecord, error: lookupError } = await db
      .from('Student')
      .select('student_id, password, is_verified')
      .eq('student_id', studentid)
      .maybeSingle();                     // null if not found, no error thrown

    if (lookupError) {
      errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Something went wrong. Please try again.';
      errorBox.classList.add('show');
      loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
      loginBtn.disabled = false;
      return;
    }

    if (!studentRecord) {
      // Matric ID doesn't exist in the system at all
      errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Student ID <strong>' + studentid + '</strong> is not registered. Please <a href="register_student.html" style="color:#dc2626;font-weight:700;">create an account</a> first.';
      errorBox.classList.add('show');
      loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
      loginBtn.disabled = false;
      return;
    }

    // ── Step 2: Check if registered but email not verified ──────────────────
    if (!studentRecord.is_verified) {
      errorBox.innerHTML = `
        <i class="bi bi-envelope-exclamation-fill"></i>
        Your account is not verified yet. Please check your email inbox and click the verification link.
        <br><br>
        <span style="font-size:12px;">Didn't receive it?
          <a href="#" id="resendLink" style="color:#dc2626;font-weight:700;">Resend verification email</a>
        </span>`;
      errorBox.classList.add('show');
      loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
      loginBtn.disabled = false;

      // Resend handler — needs the email, so fetch it first
      document.getElementById('resendLink').addEventListener('click', async (e) => {
        e.preventDefault();
        const { data: fullRecord } = await db
          .from('Student')
          .select('email')
          .eq('student_id', studentid)
          .maybeSingle();

        if (fullRecord?.email) {
          const { error: resendError } = await db.auth.resend({
            type: 'signup',
            email: fullRecord.email
          });
          if (!resendError) {
            document.getElementById('resendLink').textContent = 'Sent! Check your inbox.';
            document.getElementById('resendLink').style.pointerEvents = 'none';
          } else {
            document.getElementById('resendLink').textContent = 'Failed to resend. Try again later.';
          }
        }
      });
      return;
    }

    // ── Step 3: Validate password ───────────────────────────────────────────
    if (studentRecord.password !== password) {
      errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Incorrect password. Please try again.';
      errorBox.classList.add('show');
      loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
      loginBtn.disabled = false;
      return;
    }

    // ── Step 4: All good — fetch full record and proceed ────────────────────
    const { data, error } = await db
      .from('Student')
      .select('*')
      .eq('student_id', studentid)
      .single();

    if (error || !data) {
      errorBox.innerHTML = '<i class="bi bi-exclamation-triangle-fill"></i> Something went wrong. Please try again.';
      errorBox.classList.add('show');
      loginBtn.innerHTML = 'Login <i class="bi bi-arrow-right"></i>';
      loginBtn.disabled = false;
      return;
    }

    localStorage.setItem('studentEmail', data.email);
    localStorage.setItem('studentId',    data.student_id);
    localStorage.setItem('studentName',  data.name);
    window.location.href = 'DashBoard.html';
  }

  document.getElementById('loginBtn').addEventListener('click', handleLogin);
  document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
</script>
</body>

</html>
