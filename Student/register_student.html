<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Sign Up - UTMSPACE College Booking</title>
  <meta name="description" content="">
  <meta name="keywords" content="">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: #5c001f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Sign Up Container */
    .signup-container {
      max-width: 550px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Header Section */
    .signup-header {
      background: linear-gradient(135deg, #1a3c5e 0%, #2c5a7a 100%);
      padding: 35px 30px;
      text-align: center;
    }

    .signup-header h1 {
      color: white;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: 'Montserrat', sans-serif;
    }

    .signup-header .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    /* Form Section */
    .signup-form {
      padding: 35px 35px;
    }

    /* Form Group */
    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #333;
      margin-bottom: 6px;
      font-family: 'Montserrat', sans-serif;
    }

    .form-group label .required {
      color: #e74c3c;
      margin-left: 3px;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-wrapper i.left-icon {
      position: absolute;
      left: 15px;
      color: #aaa;
      font-size: 18px;
      z-index: 1;
    }

    /* Password wrapper with eye icon */
    .password-wrapper {
      position: relative;
      width: 100%;
    }

    .password-wrapper i.left-icon {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      color: #aaa;
      font-size: 18px;
      z-index: 1;
    }

    .password-wrapper input {
      width: 100%;
      padding: 12px 50px 12px 45px;
      font-size: 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-family: 'Roboto', sans-serif;
    }

    .password-wrapper input:focus {
      outline: none;
      border-color: #2c5a7a;
      box-shadow: 0 0 0 3px rgba(44, 90, 122, 0.1);
    }

    .toggle-password {
      position: absolute;
      right: 15px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #aaa;
      font-size: 18px;
      transition: color 0.3s ease;
      z-index: 2;
    }

    .toggle-password:hover {
      color: #2c5a7a;
    }

    .form-control {
      width: 100%;
      padding: 12px 15px 12px 45px;
      font-size: 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 12px;
      transition: all 0.3s ease;
      font-family: 'Roboto', sans-serif;
    }

    .form-control:focus {
      outline: none;
      border-color: #2c5a7a;
      box-shadow: 0 0 0 3px rgba(44, 90, 122, 0.1);
    }

    .form-control.error {
      border-color: #e74c3c;
    }

    /* Select dropdown styling */
    select.form-control {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23666' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 15px center;
      background-size: 16px;
    }

    /* Two columns layout */
    .row {
      display: flex;
      gap: 15px;
    }

    .row .form-group {
      flex: 1;
    }

    /* Password hint */
    .password-hint {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .password-hint i {
      font-size: 12px;
    }

    /* Terms and Conditions */
    .terms {
      margin: 20px 0;
    }

    .checkbox-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
    }

    .checkbox-wrapper input {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #2c5a7a;
    }

    .checkbox-wrapper label {
      margin: 0;
      font-weight: normal;
      font-size: 13px;
      color: #555;
      cursor: pointer;
    }

    .checkbox-wrapper a {
      color: #2c5a7a;
      text-decoration: none;
    }

    .checkbox-wrapper a:hover {
      text-decoration: underline;
    }

    /* Sign Up Button */
    .signup-btn {
      width: 100%;
      background: linear-gradient(135deg, #1a3c5e 0%, #2c5a7a 100%);
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .signup-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(44, 90, 122, 0.3);
    }

    .signup-btn i {
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .signup-btn:hover i {
      transform: translateX(5px);
    }

    /* Login Link */
    .login-link {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .login-link p {
      font-size: 14px;
      color: #666;
    }

    .login-link a {
      color: #2c5a7a;
      text-decoration: none;
      font-weight: 600;
      transition: color 0.3s ease;
    }

    .login-link a:hover {
      color: #5c001f;
    }

    /* Error & Success Messages */
    .error-message {
      background-color: #fee2e2;
      color: #dc2626;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      background-color: #dcfce7;
      color: #16a34a;
      padding: 12px;
      border-radius: 10px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .success-message.show {
      display: block;
    }

    /* Responsive */
    @media (max-width: 576px) {
      .signup-header {
        padding: 25px 20px;
      }
      
      .signup-header h1 {
        font-size: 28px;
      }
      
      .signup-form {
        padding: 25px 20px;
      }
      
      .form-control {
        padding: 10px 12px 10px 40px;
        font-size: 13px;
      }
      
      .password-wrapper input {
        padding: 10px 50px 10px 40px;
        font-size: 13px;
      }
      
      .row {
        flex-direction: column;
        gap: 0;
      }
    }
  </style>
</head>

<body>

  <div class="signup-container">
    <div class="signup-header">
      <h1>Sign Up</h1>
      <p class="subtitle">Create your account</p>
    </div>

    <!-- Form -->
    <div class="signup-form">
      <div class="error-message" id="errorMessage"></div>
      <div class="success-message" id="successMessage"></div>

      <div class="form-group">
        <label>Full Name <span class="required">*</span></label>
        <div class="input-wrapper">
          <i class="bi bi-person left-icon"></i>
          <input type="text" class="form-control" id="name" placeholder="Enter your full name">
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Student ID <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="bi bi-card-text left-icon"></i>
            <input type="text" class="form-control" id="studentId" placeholder="e.g., A24DW0001">
          </div>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Email Address <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="bi bi-envelope left-icon"></i>
            <input type="email" class="form-control" id="email" placeholder="you@example.com">
          </div>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Gender <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="bi bi-gender-ambiguous left-icon"></i>
            <select class="form-control" id="gender">
              <option value="">-- Select Gender --</option>
              <option value="Male">Male</option>
              <option value="Female">Female</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Telephone Number <span class="required">*</span></label>
          <div class="input-wrapper">
            <i class="bi bi-telephone left-icon"></i>
            <input type="tel" class="form-control" id="telephone" placeholder="e.g., 0123456789">
          </div>
        </div>
      </div>

      <div class="row">
        <div class="form-group">
          <label>Password <span class="required">*</span></label>
          <div class="password-wrapper">
            <i class="bi bi-lock left-icon"></i>
            <input type="password" id="password" placeholder="Create a password">
            <i class="bi bi-eye-slash toggle-password" id="togglePassword"></i>
          </div>
          <div class="password-hint">
            <i class="bi bi-info-circle"></i>
            <span>Min. 8 characters with letters, numbers & symbols (e.g. Adam@1234)</span>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm Password <span class="required">*</span></label>
          <div class="password-wrapper">
            <i class="bi bi-lock-fill left-icon"></i>
            <input type="password" id="confirmPassword" placeholder="Confirm your password">
            <i class="bi bi-eye-slash toggle-password" id="toggleConfirmPassword"></i>
          </div>
        </div>
      </div>

      <!-- Terms and Conditions -->
      <div class="terms">
        <div class="checkbox-wrapper">
          <input type="checkbox" id="agreeTerms">
          <label for="agreeTerms">
            I agree to the <a href="terms.html">Terms of Service</a> and <a href="privacy.html">Privacy Policy</a>
          </label>
        </div>
      </div>

      <button class="signup-btn" id="signupBtn">
        Create Account <i class="bi bi-arrow-right"></i>
      </button>

      <div class="login-link">
        <p>Already have an account? <a href="index.html">Sign In</a></p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/supabase.js"></script>
  <script>
    // Toggle password visibility for Password field
    const togglePassword = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    togglePassword.addEventListener('click', function() {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });

    // Toggle password visibility for Confirm Password field
    const toggleConfirmPassword = document.getElementById('toggleConfirmPassword');
    const confirmPasswordInput = document.getElementById('confirmPassword');

    toggleConfirmPassword.addEventListener('click', function() {
      const type = confirmPasswordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      confirmPasswordInput.setAttribute('type', type);
      this.classList.toggle('bi-eye');
      this.classList.toggle('bi-eye-slash');
    });

    document.getElementById('signupBtn').addEventListener('click', async () => {
      const studentId = document.getElementById('studentId').value.trim();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const gender = document.getElementById('gender').value;
      const password = document.getElementById('password').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const agreeTerms = document.getElementById('agreeTerms').checked;
      let telephone = document.getElementById('telephone').value.trim();

      const errorAlert = document.getElementById('errorMessage');
      const successAlert = document.getElementById('successMessage');
      const signupBtn = document.getElementById('signupBtn');

      errorAlert.classList.remove('show');
      successAlert.classList.remove('show');

      if (!studentId || !name || !email || !gender || !telephone || !password || !confirmPassword) {
        errorAlert.textContent = 'Please fill in all fields.';
        errorAlert.classList.add('show');
        return;
      }
      if (!/^[Aa][0-9A-Za-z]+$/.test(studentId)) {
        errorAlert.textContent = 'Student ID must start with the letter A (e.g., A24DW0001).';
        errorAlert.classList.add('show');
        return;
      }
      
      const telDigits = telephone.replace(/[-\s]/g, '');
      if (!/^0[0-9]{9,10}$/.test(telDigits)) {
        errorAlert.textContent = 'Please enter a valid Malaysian phone number (e.g., 0123456789).';
        errorAlert.classList.add('show');
        return;
      }

      // Auto-convert to +60 after validation passes
      if (telephone.startsWith('0')) {
        telephone = '+60' + telephone.substring(1);
      }
     
      const passwordRegex = /^(?=.*[a-zA-Z])(?=.*[0-9])(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
      if (!passwordRegex.test(password)) {
        errorAlert.textContent = 'Password must be at least 8 characters with letters, numbers & symbols (e.g. Adam@1234).';
        errorAlert.classList.add('show');
        return;
      }

      if (password !== confirmPassword) {
        errorAlert.textContent = 'Passwords do not match.';
        errorAlert.classList.add('show');
        return;
      }

      if (!email.endsWith('@graduate.utm.my') && !email.endsWith('@utm.my')) {
        errorAlert.textContent = 'Please use your UTM email address (@graduate.utm.my or @utm.my).';
        errorAlert.classList.add('show');
        return;
      }

      if (!agreeTerms) {
        errorAlert.textContent = 'Please agree to the Terms of Service.';
        errorAlert.classList.add('show');
        return;
      }

      const { data: existing } = await db
        .from('Student')
        .select('student_id')
        .or(`student_id.eq.${studentId},email.eq.${email}`);

      if (existing && existing.length > 0) {
        errorAlert.textContent = 'Student ID or email already registered.';
        errorAlert.classList.add('show');
        return;
      }

      signupBtn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creating account...';
      signupBtn.disabled = true;

      const { error: dbError } = await db
        .from('Student')
        .insert({
          student_id: studentId,
          name: name,
          email: email,
          gender: gender,
          telephone: telephone,
          password: password,
          is_verified: false
        });

      console.log('Supabase error:', dbError);

      if (dbError) {
        errorAlert.textContent = 'Sign Up failed. Please try again.';
        errorAlert.classList.add('show');
        signupBtn.innerHTML = 'Create Account <i class="bi bi-arrow-right"></i>';
        signupBtn.disabled = false;
        return;
      }

      const { error: magicError } = await db.auth.signInWithOtp({
        email: email,
        options: {
          shouldCreateUser: true,
          emailRedirectTo: 'http://127.0.0.1:5500/index.html'
        }
      });

      if (magicError) {
        errorAlert.textContent = 'Failed to send verification email. Please try again.';
        errorAlert.classList.add('show');
        signupBtn.innerHTML = 'Create Account <i class="bi bi-arrow-right"></i>';
        signupBtn.disabled = false;
        return;
      }

      let countdown = 5;
      successAlert.textContent = `✅ Account created! Check your email and click the link to verify. Redirecting in ${countdown}s...`;
      successAlert.classList.add('show');
      signupBtn.innerHTML = '<i class="bi bi-check-lg"></i> Check Your Email!';

      const timer = setInterval(() => {
        countdown--;
        successAlert.textContent = `✅ Account created! Check your email and click the link to verify. Redirecting in ${countdown}s...`;
        if (countdown === 0) {
          clearInterval(timer);
          window.location.href = 'index.html';
        }
      }, 1000);
    });
  </script>
</body>

</html>
