<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Logged Out - UTMSPACE College Booking</title>
  <meta name="description" content="">
  <meta name="keywords" content="">

  <link href="https://fonts.googleapis.com" rel="preconnect">
  <link href="https://fonts.gstatic.com" rel="preconnect" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&family=Montserrat:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: #5c001f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* Logout Container */
    .logout-container {
      max-width: 500px;
      width: 100%;
      background: white;
      border-radius: 24px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logout-header {
      background: linear-gradient(135deg, #1a3c5e 0%, #2c5a7a 100%);
      padding: 40px 30px;
      text-align: center;
    }

    .logout-header h1 {
      color: white;
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
      font-family: 'Montserrat', sans-serif;
    }

    .logout-header .subtitle {
      color: rgba(255, 255, 255, 0.8);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 1px;
    }

    .logout-content {
      padding: 45px 35px;
      text-align: center;
    }

    .logout-icon {
      width: 100px;
      height: 100px;
      background: #fee2e2;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 25px;
    }

    .logout-icon i {
      font-size: 50px;
      color: #6b092a;
    }

    .logout-message {
      margin-bottom: 30px;
    }

    .logout-message h2 {
      font-size: 24px;
      font-weight: 700;
      color: #1a3c5e;
      margin-bottom: 10px;
      font-family: 'Montserrat', sans-serif;
    }

    .logout-message p {
      font-size: 14px;
      color: #666;
      line-height: 1.6;
    }

    .login-btn {
      width: 100%;
      background: linear-gradient(135deg, #1a3c5e 0%, #2c5a7a 100%);
      color: white;
      border: none;
      padding: 14px;
      font-size: 16px;
      font-weight: 600;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-decoration: none;
    }

    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(44, 90, 122, 0.3);
    }

    .login-btn i {
      font-size: 18px;
      transition: transform 0.3s ease;
    }

    .login-btn:hover i {
      transform: translateX(5px);
    }

    .home-link {
      text-align: center;
      margin-top: 25px;
      padding-top: 20px;
      border-top: 1px solid #eee;
    }

    .home-link a {
      color: #2c5a7a;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: color 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .home-link a:hover {
      color: #5c001f;
    }

    .countdown-text {
      font-size: 12px;
      color: #999;
      margin-top: 20px;
    }

    .countdown-text span {
      font-weight: 600;
      color: #6b092a;
    }

    @media (max-width: 576px) {
      .logout-header {
        padding: 30px 20px;
      }
      
      .logout-header h1 {
        font-size: 28px;
      }
      
      .logout-content {
        padding: 30px 25px;
      }
      
      .logout-icon {
        width: 80px;
        height: 80px;
      }
      
      .logout-icon i {
        font-size: 40px;
      }
      
      .logout-message h2 {
        font-size: 20px;
      }
    }
  </style>
</head>

<body>

  <div class="logout-container">
    <div class="logout-header">
      <h1>Logged Out</h1>
      <p class="subtitle">You have been successfully logged out</p>
    </div>

    <div class="logout-content">
      <div class="logout-icon">
        <i class="bi bi-box-arrow-right"></i>
      </div>

      <div class="logout-message">
        <h2>See You Again!</h2>
        <p>You have been successfully logged out of your account.<br>
        Your session has been securely terminated.</p>
      </div>

      <a href="index.html" class="login-btn">
        <i class="bi bi-box-arrow-in-right"></i> Click Here to Log Back In
      </a>

      <div class="countdown-text">
        Redirecting to login page in <span id="countdown">5</span> seconds...
      </div>
    </div>
  </div>

  <script>
    let seconds = 5;
    const countdownElement = document.getElementById('countdown');
    
    const timer = setInterval(() => {
      seconds--;
      if (countdownElement) {
        countdownElement.textContent = seconds;
      }
      
      if (seconds <= 0) {
        clearInterval(timer);
        window.location.href = 'index.html';
      }
    }, 1000);
  </script>

</body>
</html>
