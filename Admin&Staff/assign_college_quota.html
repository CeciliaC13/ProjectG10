<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>Assign College Quota - UTMSPACE College Booking</title>

  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../vendor/bootstrap-icons/bootstrap-icons.css" rel="stylesheet">
  <link href="../main.css" rel="stylesheet">

  <style>
    body {
      background: #f8f9fa;
    }

    .quota-page {
      padding: 60px 0;
      min-height: 100vh;
    }

    .page-header-box {
      background: linear-gradient(135deg, #6b092a, #8b0e35);
      color: white;
      border-radius: 22px;
      padding: 35px;
      margin-bottom: 35px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.12);
    }

    .page-header-box h1 {
      color: white;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .page-header-box p {
      margin: 0;
      color: rgba(255,255,255,0.85);
    }

    .back-link-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: white;
      background: rgba(255,255,255,0.18);
      padding: 8px 16px;
      border-radius: 30px;
      text-decoration: none;
      font-weight: 600;
      margin-bottom: 18px;
    }

    .back-link-btn:hover {
      color: white;
      background: rgba(255,255,255,0.28);
    }

    .table-box {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
    }

    .quota-table {
      width: 100%;
      border-collapse: collapse;
    }

    .quota-table th {
      background: #6b092a;
      color: white;
      padding: 14px;
      text-align: center;
      font-weight: 600;
    }

    .quota-table td {
      padding: 14px;
      border-bottom: 1px solid #eee;
      text-align: center;
      vertical-align: middle;
    }

    .quota-table tr:hover {
      background: #fafafa;
    }

    .edit-btn {
      background: #2c5a7a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 7px 12px;
      font-weight: 600;
      margin: 2px;
    }

    .edit-btn:hover {
      background: #1d435d;
    }

    .delete-btn {
      background: #dc2626;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 7px 12px;
      font-weight: 600;
      margin: 2px;
    }

    .delete-btn:hover {
      background: #b91c1c;
    }

    .message-box {
      display: none;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 18px;
      font-weight: 500;
    }

    .message-box.show {
      display: block;
    }

    .message-success {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }

    .message-error {
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }

    /* Modal Styles */
    .modal-content {
      border-radius: 20px;
      border: none;
    }

    .modal-header {
      background: linear-gradient(135deg, #6b092a, #8b0e35);
      color: white;
      border-radius: 20px 20px 0 0;
    }

    .modal-header .btn-close {
      filter: brightness(0) invert(1);
    }

    .modal-title {
      color: white;
      font-weight: 600;
    }

    .modal-footer {
      border-top: none;
    }

    .modal-save-btn {
      background: #6b092a;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 8px 20px;
      font-weight: 600;
    }

    .modal-save-btn:hover {
      background: #540720;
    }

    .info-note {
      background: #e8f4fd;
      border-left: 4px solid #2c5a7a;
      border-radius: 12px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 13px;
      color: #1a3c5e;
    }

    .info-note i {
      margin-right: 8px;
    }
  </style>
</head>

<body>
 
<section class="quota-page">
  <div class="container">
 
    <div class="page-header-box">
      <a href="admin_staff_dashboard.html" class="back-link-btn">
        <i class="bi bi-arrow-left"></i> Back to Dashboard
      </a>
      <h1>Assign College Quota</h1>
      <p>Set the total room capacity for each college and room.</p>
    </div>

    <div class="row gy-4">

      <!-- TABLE -->
      <div class="col-12">
        <div class="table-box">

          <h3 class="mb-4">College Quota Records</h3>

          <div class="message-box" id="messageBox"></div>

          <div class="table-responsive">
            <table class="quota-table">
              <thead>
                <tr>
                  <th>No.</th>
                  <th>College</th>
                  <th>Room</th>
                  <th>Total Quota</th>
                  <th>Used</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="quotaTableBody"></tbody>
            </table>
          </div>

        </div>
      </div>

    </div>

  </div>
</section>

<!-- Edit Quota Modal (No Add function) -->
<div class="modal fade" id="quotaModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Edit Quota</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="editRowId">
        
        <div class="mb-3">
          <label class="form-label fw-semibold">College</label>
          <select class="form-select" id="college">
            <option value="">Loading colleges...</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Room</label>
          <select class="form-select" id="roomId">
            <option value="">Select a college first</option>
          </select>
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold">Total Quota</label>
          <input type="number" class="form-control" id="totalQuota" placeholder="Enter total rooms" min="1">
        </div>

        <div class="info-note">
          <i class="bi bi-info-circle"></i>
          Updating total quota will affect the room availability calculations.
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="modal-save-btn" onclick="saveQuota()">Save Changes</button>
      </div>
    </div>
  </div>
</div>

<script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../supabase.js"></script>
<script src="../main.js"></script>
<script>
  // db is already defined in /supabase.js
  const TABLE = 'College_Room';
 
  // Maps
  let COLLEGE_NAMES = {};
  let ROOM_NAMES = {};

  // Load colleges into dropdown
  async function loadCollegeOptions(selectedValue = '') {
    const select = document.getElementById('college');

    const { data, error } = await db
      .from('College')
      .select('id, College_name')
      .order('College_name', { ascending: true });

    if (error) {
      select.innerHTML = '<option value="">Failed to load colleges</option>';
      return;
    }

    COLLEGE_NAMES = {};
    data.forEach(row => { COLLEGE_NAMES[row.id] = row.College_name; });

    select.innerHTML = '<option value="">Select College</option>' +
      data.map(row =>
        `<option value="${row.id}" ${row.id == selectedValue ? 'selected' : ''}>${row.College_name}</option>`
      ).join('');
  }

  // Load rooms into dropdown based on college
  async function loadRoomOptions(collegeId = '', selectedValue = '') {
    const select = document.getElementById('roomId');

    const { data: allRooms, error: roomError } = await db
      .from('Room')
      .select('Room_id, Room_type')
      .order('Room_type', { ascending: true });

    if (roomError) {
      select.innerHTML = '<option value="">Failed to load rooms</option>';
      return;
    }

    ROOM_NAMES = {};
    allRooms.forEach(row => { ROOM_NAMES[row.Room_id] = row.Room_type; });

    if (!collegeId) {
      select.innerHTML = '<option value="">Select a college first</option>';
      select.disabled = true;
      return;
    }

    const { data: allowed, error: linkError } = await db
      .from('College_Room_Type')
      .select('Room_id')
      .eq('College_id', collegeId);

    if (linkError) {
      select.innerHTML = '<option value="">Failed to load rooms</option>';
      select.disabled = false;
      return;
    }

    if (!allowed || allowed.length === 0) {
      select.innerHTML = '<option value="">No rooms assigned to this college</option>';
      select.disabled = true;
      return;
    }

    const allowedIds = allowed.map(r => r.Room_id);
    const filtered = allRooms.filter(r => allowedIds.includes(r.Room_id));

    select.disabled = false;
    select.innerHTML = '<option value="">Select Room</option>' +
      filtered.map(row =>
        `<option value="${row.Room_id}" ${row.Room_id == selectedValue ? 'selected' : ''}>${row.Room_type}</option>`
      ).join('');
  }

  // College change handler
  async function onCollegeChange() {
    const collegeId = document.getElementById('college').value;
    document.getElementById('roomId').value = '';
    await loadRoomOptions(collegeId);
  }

  // Show message
  function showMessage(type, text) {
    const box = document.getElementById('messageBox');
    box.className = 'message-box show ' + (type === 'success' ? 'message-success' : 'message-error');
    box.textContent = text;
    setTimeout(() => { box.className = 'message-box'; box.textContent = ''; }, 3500);
  }

  // Render table
  function renderQuotas(records) {
    const tbody = document.getElementById('quotaTableBody');

    if (!records || records.length === 0) {
      tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">No records found.</td></tr>';
      return;
    }

    tbody.innerHTML = records.map((item, index) => {
      const used = item.Room_total - item.Room_available;
      const collegeName = COLLEGE_NAMES[item.College_id] || item.College_id;
      const roomName = ROOM_NAMES[item.Room_id] || item.Room_id;

      return `
        <tr>
          <td>${index + 1}</td>
          <td>${collegeName}</td>
          <td><strong>${roomName}</strong></td>
          <td>${item.Room_total}</td>
          <td><span class="badge bg-secondary">${used}</span></td>
          <td>
            <button class="edit-btn" onclick="openEditModal('${item.id}')">
              <i class="bi bi-pencil"></i> Edit
            </button>
            <button class="delete-btn" onclick="deleteQuota('${item.id}')">
              <i class="bi bi-trash"></i> Delete
            </button>
          </td>
        </tr>`;
    }).join('');
  }

  // Load all quotas
  async function loadQuotas() {
    const tbody = document.getElementById('quotaTableBody');
    tbody.innerHTML = '<tr><td colspan="6" class="text-center py-4 text-muted">Loading...</td></tr>';

    const [quotaResult] = await Promise.all([
      db.from(TABLE).select('*').order('College_id', { ascending: true }),
      loadCollegeOptions(),
      loadRoomOptions()
    ]);

    const { data, error } = quotaResult;

    if (error) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-danger">Failed to load: ${error.message}</td></tr>`;
      return;
    }

    renderQuotas(data);
  }

  // Open Edit Modal
  async function openEditModal(id) {
    const { data, error } = await db.from(TABLE).select('*').eq('id', id).single();

    if (error || !data) {
      showMessage('error', 'Could not load record.');
      return;
    }

    document.getElementById('editRowId').value = data.id;
    document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil-square"></i> Edit Quota';
    document.getElementById('totalQuota').value = data.Room_total;

    await loadCollegeOptions(data.College_id);
    await loadRoomOptions(data.College_id, data.Room_id);

    const modalEl = document.getElementById('quotaModal');
    const modal = new bootstrap.Modal(modalEl);
    modal.show();
  }

  // Save (Update only - no add)
  async function saveQuota() {
    const editId = document.getElementById('editRowId').value;
    const college = document.getElementById('college').value.trim();
    const roomId = document.getElementById('roomId').value.trim();
    const total = document.getElementById('totalQuota').value;

    if (!editId) {
      showMessage('error', 'Invalid record. Please refresh and try again.');
      return;
    }

    if (!college || !roomId || total === '') {
      showMessage('error', 'Please fill in all fields.');
      return;
    }
    if (Number(total) < 1) {
      showMessage('error', 'Total quota must be at least 1.');
      return;
    }

    const modalEl = document.getElementById('quotaModal');
    const modal = bootstrap.Modal.getInstance(modalEl);

    const payload = {
      College_id: college,
      Room_id: roomId,
      Room_total: Number(total)
    };

    const { error } = await db.from(TABLE).update(payload).eq('id', editId);

    if (error) {
      showMessage('error', 'Error updating: ' + error.message);
      return;
    }
    
    showMessage('success', 'Quota updated successfully.');
    

    if (modal) modal.hide();
    loadQuotas();
  }

  // Delete quota
  async function deleteQuota(id) {
    if (!confirm('Are you sure you want to delete this quota record?')) return;

    const { error } = await db.from(TABLE).delete().eq('id', id);

    if (error) {
      showMessage('error', 'Error deleting: ' + error.message);
      return;
    }

    showMessage('success', 'Quota deleted successfully.');
    loadQuotas();
  }

  // College dropdown change listener for modal
  document.getElementById('college').addEventListener('change', onCollegeChange);

  // Make functions global for onclick
  window.openEditModal = openEditModal;
  window.saveQuota = saveQuota;
  window.deleteQuota = deleteQuota;

  // Init
  loadQuotas();
</script>
</body>
</html>
